# Production — image GHCR, reverse proxy Apache en amont (hors Compose).
# Déploiement : cp .env.example .env, renseigner AUTH_SECRET, puis :
#   export HOBBYHOOPS_VERSION=1.24.1   # tag publié sur GHCR
#   docker compose pull && docker compose up -d
#
# Au démarrage, l'entrypoint exécute la migration SQLite avant le serveur.
# Si la migration échoue, le conteneur quitte avec le code 1 (Compose échoue).
#
# Dev local (build) : docker compose -f docker-compose.dev.yml up --build

services:
  app:
    image: ghcr.io/mcinquin/hobbyhoops:${HOBBYHOOPS_VERSION:-1.24.1}
    pull_policy: always
    container_name: hobbyhoops
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: ["node", "server.js"]
    user: "1111:1111"
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    stop_grace_period: "30s"
    # Pas de mem_limit / cpus : Next.js + SQLite ont besoin de marge ; un plafond
    # bas (ex. 768m, 1 CPU) provoque lenteur, swap et GC agressif.
    # Écoute uniquement en local ; Apache proxy vers 127.0.0.1:3000
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - path: .env
        required: true
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required — openssl rand -hex 32}
      # true si Apache réécrit X-Forwarded-For / X-Forwarded-Proto (recommandé)
      TRUST_PROXY: ${TRUST_PROXY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      - ./data:/app/data
    tmpfs:
      - /tmp:size=256M,mode=1777
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
