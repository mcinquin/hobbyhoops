services:
  app:
    build: .
    user: "1111:1111"
    security_opt:
      - no-new-privileges:true
    # Port accessible uniquement en local (pas depuis le réseau extérieur)
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      # Clé de signature des sessions (min. 16 caractères, obligatoire en production).
      # Générer une valeur forte : openssl rand -hex 32
      AUTH_SECRET: ${AUTH_SECRET}
      # Cookie de session en HTTPS (true/false). Par défaut : true en production ou si X-Forwarded-Proto=https.
      # COOKIE_SECURE: "true"
      # Faire confiance à X-Forwarded-For / X-Real-IP uniquement derrière un reverse proxy qui les réécrit.
      TRUST_PROXY: ${TRUST_PROXY:-false}
    volumes:
      # Persistance SQLite + JSON (fichiers vides créés au premier démarrage si absents).
      - ./data:/app/data
    restart: unless-stopped