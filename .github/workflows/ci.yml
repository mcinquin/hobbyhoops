name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Aucune permission par défaut — chaque job déclare exactement ce dont il a besoin.
permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Contrôles qualité (lint, typecheck, audit)
        run: npm run ci:full

  docker:
    runs-on: ubuntu-24.04
    needs: quality
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      # Requis pour l'attestation de provenance SLSA et le SBOM.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=sha-

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          # Validation Docker pour les PR. Sur main, seul le job release construit
          # l'image quand semantic-release publie vraiment une version.
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: semantic-release
    runs-on: ubuntu-24.04
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      packages: write
      pull-requests: write
      # Requis pour l'attestation de provenance SLSA et le SBOM.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Détecter la release publiée
        id: release
        run: |
          tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' | sort -V | tail -n 1 || true)"

          if [[ -z "$tag" ]]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "published=true" >> "$GITHUB_OUTPUT"

          # Syntaxe heredoc : évite l'injection si la valeur contenait un saut de ligne.
          {
            echo "tag<<_DELIM_"
            echo "$tag"
            echo "_DELIM_"
          } >> "$GITHUB_OUTPUT"

          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "latest=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        if: steps.release.outputs.published == 'true'

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        if: steps.release.outputs.published == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        if: steps.release.outputs.published == 'true'
        id: release-meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.release.outputs.latest == 'true' }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        if: steps.release.outputs.published == 'true'
        with:
          context: .
          push: true
          tags: ${{ steps.release-meta.outputs.tags }}
          labels: ${{ steps.release-meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
