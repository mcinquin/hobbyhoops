# Image Docker versionnée pour les releases créées manuellement.
# Les releases créées par semantic-release avec GITHUB_TOKEN publient l'image
# directement depuis le job `release` de ci.yml, car GitHub ne redéclenche pas
# un workflow `on: release` depuis GITHUB_TOKEN.
name: Release Docker

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-docker-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Valider le tag de release
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag de release invalide: $RELEASE_TAG" >&2
            exit 1
          fi

          if [[ "$IS_PRERELEASE" == "false" && "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "latest=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sur l'événement `release`, GITHUB_REF n'est pas toujours refs/tags/* :
      # il faut passer explicitement le tag semantic-release (ex. v1.2.3).
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ steps.release.outputs.latest == 'true' }}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
