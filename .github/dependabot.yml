version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # @types/node suit les majors de Node.js (24, 26, 28…).
    # Tant que le runtime est verrouillé sur Node 24, on n'accepte que les patch/minor 24.x.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      dev-tools:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    # Ignorer les mises à jour majeures de node : on décide manuellement
    # quand passer à la prochaine version LTS (paires : 24 → 26 → 28…).
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
