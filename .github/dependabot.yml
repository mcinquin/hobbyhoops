version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # @types/node suit les versions majeures de Node.js.
    # Les versions impaires (25, 27, 29…) sont non-LTS — on les ignore.
    ignore:
      - dependency-name: "@types/node"
        versions: ["25.*", "27.*", "29.*", "31.*", "33.*"]
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      dev-tools:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    # Ignorer les mises à jour majeures de node : on décide manuellement
    # quand passer à la prochaine version LTS (paires : 24 → 26 → 28…).
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
